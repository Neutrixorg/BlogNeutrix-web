<!DOCTYPE html>
<html lang="en">
    <script type="application/ld+json">
{
 "@context":"https://schema.org",
 "@type":"Organization",
 "name":"BlogNeutrix",
 "url":"https://neutrix.in",
 "logo":"https://neutrix.in/weblogo.png",
 "sameAs":[
   "https://www.instagram.com/neutrixorg/"
 ]
}
</script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register | BlogNeutrix</title>
    <link rel="icon" type="image/png" href="weblogo.png">
    <link rel="stylesheet" href="auth.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9756615174430484"
     crossorigin="anonymous"></script>
</head>
<body>

<div class="container">
    <div class="box">
        <h2 id="formTitle">Login</h2>
        <input type="text" id="name" placeholder="Full Name" style="display:none;">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="handleAuth()">Submit</button>
        <p id="toggleText">
            Don't have an account? 
            <span onclick="toggleForm()">Register</span>
        </p>
    </div>
</div>

<script type="module" src="auth.js"></script>
</body>
</html>
